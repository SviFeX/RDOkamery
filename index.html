<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" href="ico/favicon.ico" sizes="any">
<link rel="icon" type="image/png" sizes="16x16" href="ico/favicon-16x16.png">
<link rel="icon" type="image/png" sizes="32x32" href="ico/favicon-32x32.png">
<link rel="apple-touch-icon" sizes="180x180" href="ico/apple-touch-icon.png">

  <title>Podgląd kamer</title>

  <style>
    :root {
      --overview-tile-width: 300px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      font-family: Arial, sans-serif;
      background: #111;
      color: #fff;
    }

    body.overview-mode {
      height: 100vh;
      overflow: hidden;
    }

    header {
      padding: 16px 20px;
      text-align: center;
      background: #1c1c1c;
      border-bottom: 1px solid #333;
    }

    body.overview-mode header {
      display: none;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .toolbar {
      display: flex;
      justify-content: center;
      gap: 10px;
      padding: 8px;
      background: #181818;
      border-bottom: 1px solid #333;
    }

    .view-button {
      border: 1px solid #444;
      background: #222;
      color: #fff;
      padding: 7px 14px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 14px;
      font-weight: bold;
    }

    .view-button:hover {
      background: #333;
    }

    .view-button.is-active {
      background: #fff;
      color: #111;
      border-color: #fff;
    }

    .camera-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      padding: 16px;
      max-width: 1600px;
      width: 100%;
      margin: 0 auto;
    }

    .camera-grid.is-overview {
      flex: 1;
      width: 100%;
      max-width: none;
      margin: 0;
      padding: 6px;
      gap: 6px;
      overflow: hidden;

      grid-template-columns: repeat(5, var(--overview-tile-width));
      grid-template-rows: repeat(4, auto);

      justify-content: center;
      align-content: center;
    }

    .camera-tile {
      background: #1b1b1b;
      border: 1px solid #333;
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: transform 0.15s ease, border-color 0.15s ease;
    }

    .camera-tile:hover {
      transform: scale(1.01);
      border-color: #666;
    }

    .camera-grid.is-overview .camera-tile {
      width: var(--overview-tile-width);
      min-width: 0;
      padding: 4px;
      border-radius: 6px;
      background: #080808;
      border-color: #222;
    }

    .camera-view {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: #000;
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #444;
    }

    .camera-grid.is-overview .camera-view {
      aspect-ratio: 4 / 3;
      border-radius: 4px;
      border-color: #222;
    }

    .camera-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .camera-grid.is-overview .camera-view img {
      object-fit: cover;
    }

    .camera-caption {
      margin-top: 8px;
      text-align: center;
      font-size: 15px;
      font-weight: bold;
      color: #eaeaea;
    }

    .camera-grid.is-overview .camera-caption {
      margin-top: 3px;
      font-size: 12px;
      line-height: 1.1;
      color: #ddd;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .camera-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      padding: 16px;
      background: rgba(0, 0, 0, 0.92);
      cursor: pointer;
    }

    .camera-modal.is-open {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-modal-content {
      width: calc(100vw - 32px);
      height: calc(100vh - 32px);
      background: #000;
      border-radius: 10px;
      overflow: hidden;
      border: 1px solid #333;
      display: flex;
      flex-direction: column;
    }

    .camera-modal-image-wrapper {
      flex: 1;
      min-height: 0;
      background: #000;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-modal-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
    }

    .camera-modal-caption {
      padding: 10px 16px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;
      background: #111;
      border-top: 1px solid #333;
    }

    @media (max-width: 1000px) {
      .camera-grid:not(.is-overview) {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 650px) {
      .camera-grid:not(.is-overview) {
        grid-template-columns: 1fr;
      }

      .camera-modal {
        padding: 8px;
      }

      .camera-modal-content {
        width: calc(100vw - 16px);
        height: calc(100vh - 16px);
      }

      .camera-modal-caption {
        font-size: 16px;
      }
    }
  </style>
</head>

<body class="overview-mode">
  <header>
    <h1>Podgląd kamer</h1>
  </header>

  <div class="toolbar" id="toolbar">
    <button class="view-button is-active" id="overviewViewButton" type="button">
      WIDOK KOMPAKTOWY
    </button>

    <button class="view-button" id="standardViewButton" type="button">
      WSZYSTKIE KAMERY
    </button>
  </div>

  <main class="camera-grid is-overview" id="cameraGrid"></main>

  <div class="camera-modal" id="cameraModal">
    <div class="camera-modal-content">
      <div class="camera-modal-image-wrapper">
        <img id="cameraModalImage" src="" alt="" />
      </div>

      <div class="camera-modal-caption" id="cameraModalCaption"></div>
    </div>
  </div>

  <script>

      },

      },
      {

      {

      },
      {

      },
      {
        deviceNumber: 188,
        name: "[188] Wjazd P3/P",
        src: "http://10.48.42.120:8081/video_feed"
      },
      {
        deviceNumber: 197,
        name: "[197] Wyjazd P3/L",
        src: "http://10.48.42.126:8081/video_feed"
      },
      {
        deviceNumber: 198,
        name: "[198] Wyjazd P3/P",
        src: "http://10.48.42.127:8081/video_feed"
      }
    ];

    const overviewDeviceOrder = [
      101, 102, 103, 181, 191,
      151, 152, 153, 183, 193,
      104, 105, 106, 186, 196,
      154, 155, 156, 182, 192
    ];

    const cameraGrid = document.getElementById("cameraGrid");
    const toolbar = document.getElementById("toolbar");

    const overviewViewButton = document.getElementById("overviewViewButton");
    const standardViewButton = document.getElementById("standardViewButton");

    const cameraModal = document.getElementById("cameraModal");
    const cameraModalImage = document.getElementById("cameraModalImage");
    const cameraModalCaption = document.getElementById("cameraModalCaption");

    let currentViewMode = "overview";

    function getCameraByDeviceNumber(deviceNumber) {
      return cameras.find((camera) => camera.deviceNumber === deviceNumber);
    }

    function getVisibleCameras() {
      if (currentViewMode === "overview") {
        return overviewDeviceOrder
          .map(getCameraByDeviceNumber)
          .filter(Boolean);
      }

      return cameras;
    }

    function updateOverviewTileSize() {
      if (currentViewMode !== "overview") {
        return;
      }

      const columns = 5;
      const rows = 4;

      const gridPadding = 12;
      const gap = 6;
      const tileExtraHeight = 28;

      const toolbarHeight = toolbar.offsetHeight;

      const availableWidth =
        window.innerWidth - gridPadding - gap * (columns - 1);

      const availableHeight =
        window.innerHeight - toolbarHeight - gridPadding - gap * (rows - 1);

      const tileWidthByWidth = availableWidth / columns;

      const tileHeightByHeight = availableHeight / rows;
      const imageHeightByHeight = tileHeightByHeight - tileExtraHeight;
      const tileWidthByHeight = imageHeightByHeight * 4 / 3;

      const tileWidth = Math.floor(
        Math.max(120, Math.min(tileWidthByWidth, tileWidthByHeight))
      );

      document.documentElement.style.setProperty(
        "--overview-tile-width",
        `${tileWidth}px`
      );
    }

    function openCameraModal(camera) {
      cameraModalImage.src = camera.src;
      cameraModalImage.alt = camera.name;
      cameraModalCaption.textContent = camera.name;
      cameraModal.classList.add("is-open");
      document.body.style.overflow = "hidden";
    }

    function closeCameraModal() {
      cameraModal.classList.remove("is-open");
      cameraModalImage.src = "";
      cameraModalImage.alt = "";
      cameraModalCaption.textContent = "";

      if (currentViewMode === "overview") {
        document.body.style.overflow = "hidden";
      } else {
        document.body.style.overflow = "";
      }
    }

    function setViewMode(viewMode) {
      currentViewMode = viewMode;

      const isOverview = currentViewMode === "overview";

      document.body.classList.toggle("overview-mode", isOverview);
      cameraGrid.classList.toggle("is-overview", isOverview);

      overviewViewButton.classList.toggle("is-active", isOverview);
      standardViewButton.classList.toggle("is-active", !isOverview);

      document.body.style.overflow = isOverview ? "hidden" : "";

      renderCameras();
      updateOverviewTileSize();
    }

    function renderCameras() {
      cameraGrid.innerHTML = "";

      const visibleCameras = getVisibleCameras();

      visibleCameras.forEach((camera) => {
        const tile = document.createElement("div");
        tile.className = "camera-tile";
        tile.title = "Kliknij, aby powiększyć";

        const view = document.createElement("div");
        view.className = "camera-view";

        const image = document.createElement("img");
        image.src = camera.src;
        image.alt = camera.name;

        const caption = document.createElement("div");
        caption.className = "camera-caption";
        caption.textContent = camera.name;

        tile.addEventListener("click", () => {
          openCameraModal(camera);
        });

        view.appendChild(image);
        tile.appendChild(view);
        tile.appendChild(caption);
        cameraGrid.appendChild(tile);
      });
    }

    overviewViewButton.addEventListener("click", () => {
      setViewMode("overview");
    });

    standardViewButton.addEventListener("click", () => {
      setViewMode("standard");
    });

    cameraModal.addEventListener("click", () => {
      closeCameraModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && cameraModal.classList.contains("is-open")) {
        closeCameraModal();
      }
    });

    window.addEventListener("resize", () => {
      updateOverviewTileSize();
    });

    renderCameras();
    updateOverviewTileSize();
  </script>
</body>
</html>
