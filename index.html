<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <title>Podgląd kamer</title>

  <link rel="icon" href="ico/favicon.ico" sizes="any">
  <link rel="icon" type="image/png" sizes="16x16" href="ico/favicon-16x16.png">
  <link rel="icon" type="image/png" sizes="32x32" href="ico/favicon-32x32.png">
  <link rel="apple-touch-icon" sizes="180x180" href="ico/apple-touch-icon.png">

  <style>
    :root {
      --overview-tile-width: 300px;
      --standard-tile-width: 220px;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;

      display: flex;
      flex-direction: column;

      font-family: Arial, sans-serif;
      color: #fff;

      background-color: #111;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url("images/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    header {
      display: none;
    }

    h1 {
      margin: 0;
      font-size: 26px;
    }

    .mode-toggle {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 5000;

      border: 1px solid rgba(255, 255, 255, 0.18);
      background: rgba(20, 20, 20, 0.72);
      color: #fff;

      padding: 9px 13px;
      border-radius: 999px;

      cursor: pointer;
      font-size: 13px;
      font-weight: bold;

      backdrop-filter: blur(8px);
      box-shadow: 0 4px 18px rgba(0, 0, 0, 0.45);
      opacity: 0.68;
      transition: opacity 0.15s ease, transform 0.15s ease, background 0.15s ease;
    }

    .mode-toggle:hover {
      opacity: 1;
      transform: scale(1.04);
      background: rgba(35, 35, 35, 0.9);
    }

    .camera-grid {
      flex: 1;
      width: 100%;
      height: 100%;

      display: grid;
      margin: 0;
      padding: 1px;
      gap: 1px;
      overflow: hidden;

      justify-content: center;
      align-content: center;
    }

    .camera-grid.is-overview {
      grid-template-columns: repeat(5, var(--overview-tile-width));
      grid-template-rows: repeat(4, auto);
    }

    .camera-grid.is-standard {
      grid-template-columns: repeat(7, var(--standard-tile-width));
      grid-template-rows: repeat(4, auto);
    }

    .camera-tile {
      background: transparent;
      border: none;
      border-radius: 2px;
      padding: 0;
      cursor: pointer;
      transition: transform 0.12s ease;
    }

    .camera-tile:hover {
      transform: scale(1.005);
    }

    .camera-grid.is-overview .camera-tile {
      width: var(--overview-tile-width);
      min-width: 0;
      padding: 0;
      border-radius: 2px;
      background: transparent;
    }

    .camera-grid.is-standard .camera-tile {
      width: var(--standard-tile-width);
      min-width: 0;
      padding: 0;
      border-radius: 2px;
      background: transparent;
    }

    .camera-view {
      position: relative;
      width: 100%;
      aspect-ratio: 4 / 3;
      background: transparent;
      border-radius: 2px;
      overflow: hidden;
      border: none;
    }

    .camera-view img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      background: transparent;
    }

    .camera-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;

      padding: 2px 5px;
      text-align: center;
      font-size: 11px;
      font-weight: bold;
      line-height: 1.15;

      color: #fff;
      background: rgba(0, 0, 0, 0.38);
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.9);

      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      pointer-events: none;
    }

    .camera-modal {
      position: fixed;
      inset: 0;
      z-index: 9999;
      display: none;
      padding: 10px;
      cursor: pointer;

      background-color: #111;
      background-image:
        linear-gradient(rgba(0, 0, 0, 0.55), rgba(0, 0, 0, 0.55)),
        url("images/background.jpg");
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
    }

    .camera-modal.is-open {
      display: flex;
      align-items: center;
      justify-content: center;
      animation: modalFadeIn 0.14s ease-out;
    }

    .camera-modal-content {
      position: relative;

      width: min(calc(100vw - 20px), calc((100vh - 20px) * 4 / 3));
      aspect-ratio: 4 / 3;

      background: transparent;
      border-radius: 4px;
      overflow: hidden;
      border: none;

      animation: modalZoomIn 0.16s ease-out;
      transform-origin: center center;
    }

    .camera-modal-image-wrapper {
      position: relative;
      width: 100%;
      height: 100%;
      background: transparent;

      display: flex;
      align-items: center;
      justify-content: center;
    }

    .camera-modal-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: transparent;
    }

    .camera-modal-caption {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      z-index: 2;

      width: 100%;

      padding: 8px 14px;
      font-size: 20px;
      font-weight: bold;
      text-align: center;

      background: rgba(0, 0, 0, 0.42);
      color: #fff;
      text-shadow: 0 1px 4px rgba(0, 0, 0, 1);
      pointer-events: none;
    }

    @keyframes modalFadeIn {
      from {
        opacity: 0;
      }

      to {
        opacity: 1;
      }
    }

    @keyframes modalZoomIn {
      from {
        opacity: 0;
        transform: scale(0.94);
      }

      to {
        opacity: 1;
        transform: scale(1);
      }
    }

    @media (max-width: 650px) {
      .camera-modal {
        padding: 6px;
      }

      .camera-modal-content {
        width: min(calc(100vw - 12px), calc((100vh - 12px) * 4 / 3));
      }

      .camera-modal-caption {
        font-size: 16px;
      }

      .mode-toggle {
        right: 8px;
        bottom: 8px;
        padding: 8px 11px;
        font-size: 12px;
      }
    }
  </style>
</head>

<body>
  <header>
    <h1>Podgląd kamer</h1>
  </header>

  <main class="camera-grid is-overview" id="cameraGrid"></main>

  <button class="mode-toggle" id="modeToggleButton" type="button">
    Widok standardowy
  </button>

  <div class="camera-modal" id="cameraModal">
    <div class="camera-modal-content">
      <div class="camera-modal-caption" id="cameraModalCaption"></div>

      <div class="camera-modal-image-wrapper">
        <img id="cameraModalImage" src="" alt="" />
      </div>
    </div>
  </div>

  <script>
    const cameras = [
      {
        deviceNumber: 101,
        name: "[101] Wjazd Lubelska 1",
        src: "http://10.48.42.101:8081/video_feed"
      },
      {
        deviceNumber: 102,
        name: "[102] Wjazd Lubelska 2",
        src: "http://10.48.42.102:8081/video_feed"
      },
      {
        deviceNumber: 103,
        name: "[103] Wjazd Lubelska 3",
        src: "http://10.48.42.103:8081/video_feed"
      },
      {
        deviceNumber: 104,
        name: "[104] Wjazd ALWP 1",
        src: "http://10.48.42.104:8081/video_feed"
      },
      {
        deviceNumber: 105,
        name: "[105] Wjazd ALWP 2",
        src: "http://10.48.42.105:8081/video_feed"
      },
      {
        deviceNumber: 106,
        name: "[106] Wjazd ALWP 3",
        src: "http://10.48.42.106:8081/video_feed"
      },
      {
        deviceNumber: 151,
        name: "[151] Wyjazd Lubelska 1",
        src: "http://10.48.42.107:8081/video_feed"
      },
      {
        deviceNumber: 152,
        name: "[152] Wyjazd Lubelska 2",
        src: "http://10.48.42.108:8081/video_feed"
      },
      {
        deviceNumber: 153,
        name: "[153] Wyjazd Lubelska 3",
        src: "http://10.48.42.109:8081/video_feed"
      },
      {
        deviceNumber: 154,
        name: "[154] Wyjazd ALWP 1",
        src: "http://10.48.42.110:8081/video_feed"
      },
      {
        deviceNumber: 155,
        name: "[155] Wyjazd ALWP 2",
        src: "http://10.48.42.111:8081/video_feed"
      },
      {
        deviceNumber: 156,
        name: "[156] Wyjazd ALWP 3",
        src: "http://10.48.42.112:8081/video_feed"
      },
      {
        deviceNumber: 181,
        name: "[181] Wjazd P1",
        src: "http://10.48.42.113:8081/video_feed"
      },
      {
        deviceNumber: 183,
        name: "[183] Wjazd P2",
        src: "http://10.48.42.115:8081/video_feed"
      },
      {
        deviceNumber: 182,
        name: "[182] Wjazd BUS",
        src: "http://10.48.42.114:8081/video_feed"
      },
      {
        deviceNumber: 191,
        name: "[191] Wyjazd P1",
        src: "http://10.48.42.121:8081/video_feed"
      },
      {
        deviceNumber: 193,
        name: "[193] Wyjazd P2",
        src: "http://10.48.42.123:8081/video_feed"
      },
      {
        deviceNumber: 192,
        name: "[192] Wyjazd BUS",
        src: "http://10.48.42.122:8081/video_feed"
      },
      {
        deviceNumber: 186,
        name: "[186] Wjazd Pracowniczy",
        src: "http://10.48.42.118:8081/video_feed"
      },
      {
        deviceNumber: 196,
        name: "[196] Wyjazd Pracowniczy",
        src: "http://10.48.42.125:8081/video_feed"
      },
      {
        deviceNumber: 194,
        name: "[194] Wyjazd Dostawy",
        src: "http://10.48.42.124:8081/video_feed"
      },
      {
        deviceNumber: 184,
        name: "[184] Wjazd Dostawy/L",
        src: "http://10.48.42.116:8081/video_feed"
      },
      {
        deviceNumber: 185,
        name: "[185] Wjazd Dostawy/P",
        src: "http://10.48.42.117:8081/video_feed"
      },
      {
        deviceNumber: 187,
        name: "[187] Wjazd P3/L",
        src: "http://10.48.42.119:8081/video_feed"
      },
      {
        deviceNumber: 188,
        name: "[188] Wjazd P3/P",
        src: "http://10.48.42.120:8081/video_feed"
      },
      {
        deviceNumber: 197,
        name: "[197] Wyjazd P3/L",
        src: "http://10.48.42.126:8081/video_feed"
      },
      {
        deviceNumber: 198,
        name: "[198] Wyjazd P3/P",
        src: "http://10.48.42.127:8081/video_feed"
      }
    ];

    const overviewDeviceOrder = [
  103, 102, 101, 181, 183,
  153, 152, 151, 191, 193,
  106, 105, 104, 186, 182,
  156, 155, 154, 196, 192
];
const standardDeviceOrder = [
  103, 102, 101, 181, 183, 188, 187,
  153, 152, 151, 191, 193, 198, 197,
  106, 105, 104, 186, 182, 185, 184,
  156, 155, 154, 196, 192, 194
];

    const cameraGrid = document.getElementById("cameraGrid");
    const modeToggleButton = document.getElementById("modeToggleButton");

    const cameraModal = document.getElementById("cameraModal");
    const cameraModalImage = document.getElementById("cameraModalImage");
    const cameraModalCaption = document.getElementById("cameraModalCaption");

    let currentViewMode = "overview";

    function getCameraByDeviceNumber(deviceNumber) {
      return cameras.find((camera) => camera.deviceNumber === deviceNumber);
    }

    function getVisibleCameras() {
  if (currentViewMode === "overview") {
    return overviewDeviceOrder
      .map(getCameraByDeviceNumber)
      .filter(Boolean);
  }

  if (currentViewMode === "standard") {
    return standardDeviceOrder
      .map(getCameraByDeviceNumber)
      .filter(Boolean);
  }

  return cameras;
}

    function updateTileSizes() {
      const gap = 1;
      const gridPadding = 2;

      if (currentViewMode === "overview") {
        const columns = 5;
        const rows = 4;

        const availableWidth =
          window.innerWidth - gridPadding - gap * (columns - 1);

        const availableHeight =
          window.innerHeight - gridPadding - gap * (rows - 1);

        const tileWidthByWidth = availableWidth / columns;
        const tileWidthByHeight = (availableHeight / rows) * 4 / 3;

        const tileWidth = Math.floor(
          Math.max(120, Math.min(tileWidthByWidth, tileWidthByHeight))
        );

        document.documentElement.style.setProperty(
          "--overview-tile-width",
          `${tileWidth}px`
        );
      }

      if (currentViewMode === "standard") {
        const columns = 7;
        const rows = 4;

        const availableWidth =
          window.innerWidth - gridPadding - gap * (columns - 1);

        const availableHeight =
          window.innerHeight - gridPadding - gap * (rows - 1);

        const tileWidthByWidth = availableWidth / columns;
        const tileWidthByHeight = (availableHeight / rows) * 4 / 3;

        const tileWidth = Math.floor(
          Math.max(90, Math.min(tileWidthByWidth, tileWidthByHeight))
        );

        document.documentElement.style.setProperty(
          "--standard-tile-width",
          `${tileWidth}px`
        );
      }
    }

    function updateToggleButtonText() {
      modeToggleButton.textContent =
        currentViewMode === "overview"
          ? "POKAŻ INNE"
          : "UKRYJ INNE";
    }

    function openCameraModal(camera) {
      cameraModalImage.src = camera.src;
      cameraModalImage.alt = camera.name;
      cameraModalCaption.textContent = camera.name;
      cameraModal.classList.add("is-open");
    }

    function closeCameraModal() {
      cameraModal.classList.remove("is-open");
      cameraModalImage.src = "";
      cameraModalImage.alt = "";
      cameraModalCaption.textContent = "";
    }

    function setViewMode(viewMode) {
      currentViewMode = viewMode;

      const isOverview = currentViewMode === "overview";
      const isStandard = currentViewMode === "standard";

      cameraGrid.classList.toggle("is-overview", isOverview);
      cameraGrid.classList.toggle("is-standard", isStandard);

      renderCameras();
      updateTileSizes();
      updateToggleButtonText();
    }

    function toggleViewMode() {
      setViewMode(currentViewMode === "overview" ? "standard" : "overview");
    }

    function renderCameras() {
      cameraGrid.innerHTML = "";

      const visibleCameras = getVisibleCameras();

      visibleCameras.forEach((camera) => {
        const tile = document.createElement("div");
        tile.className = "camera-tile";
        tile.title = "Kliknij, aby powiększyć";

        const view = document.createElement("div");
        view.className = "camera-view";

        const image = document.createElement("img");
        image.src = camera.src;
        image.alt = camera.name;

        const caption = document.createElement("div");
        caption.className = "camera-caption";
        caption.textContent = camera.name;

        tile.addEventListener("click", () => {
          openCameraModal(camera);
        });

        view.appendChild(image);
        view.appendChild(caption);
        tile.appendChild(view);
        cameraGrid.appendChild(tile);
      });
    }

    modeToggleButton.addEventListener("click", toggleViewMode);

    cameraModal.addEventListener("click", () => {
      closeCameraModal();
    });

    document.addEventListener("keydown", (event) => {
      if (event.key === "Escape" && cameraModal.classList.contains("is-open")) {
        closeCameraModal();
      }
    });

    window.addEventListener("resize", () => {
      updateTileSizes();
    });

    renderCameras();
    updateTileSizes();
    updateToggleButtonText();
  </script>
</body>
</html>
